<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Геометричні фігури</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="cell">
        <div id="circle"></div>
    </div>
    <div class="cell">
        <div id="square"></div>
    </div>
    <div class="cell">
        <div id="rectangle"></div>
    </div>
    <div class="cell">
        <div id="oval"></div>
    </div>
    <div class="cell">
        <div id="triangle"></div>
    </div>
    <div class="cell">
        <div id="triangle_down"></div>
    </div>
    <div class="cell">
        <div id="triangle_left"></div>
    </div>
    <div class="cell">
        <div id="triangle_right"></div>
    </div>
    <div class="cell">
        <div id="diamond"></div>
    </div>
    <div class="cell">
        <div id="trapezium"></div>
    </div>
    <div class="cell">
        <div id="parallelogram"></div>
    </div>
    <div class="cell">
        <div id="star"></div>
    </div>
    <div class="cell">
        <div id="star_six_points"></div>
    </div>
    <div class="cell">
        <div id="pentagon"></div>
    </div>
    <div class="cell">
        <div id="hexagon"></div>
    </div>
    <div class="cell">
        <div id="octagon"></div>
    </div>
    <div class="cell">
        <div id="heart"></div>
    </div>
    <div class="cell">
        <div id="infinity"></div>
    </div>
    <div class="cell">
        <div id="comment_bubble"></div>
    </div>
    <div class="cell">
        <div id="pacman"></div>
    </div>
</body>
</html>
