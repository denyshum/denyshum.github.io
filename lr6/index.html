<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Меню бургерів</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="menu-card">
        <div class="menu-inner">
            <h2 class="menu-title">Лови момент!</h2>
            <ul class="menu-list">
                <li class="menu-item">
                    <h3 class="menu-item-title">MICHIGAN</h3>
                    <p class="menu-item-price">64.00 ГРН</p>
                </li>
                <li class="menu-item">
                    <h3 class="menu-item-title">Beef BBQ</h3>
                    <p class="menu-item-price">59.00 ГРН</p>
                </li>
                <li class="menu-item">
                    <h3 class="menu-item-title">Cheeseburger</h3>
                    <p class="menu-item-price">59.00 ГРН</p>
                </li>
                <li class="menu-item">
                    <h3 class="menu-item-title">KETCHUP ROOM</h3>
                    <p class="menu-item-price">68.00 ГРН</p>
                </li>
                <li class="menu-item">
                    <h3 class="menu-item-title">KETCHUP ROOM 2</h3>
                    <p class="menu-item-price">72.00 ГРН</p>
                </li>
                <li class="menu-item">
                    <h3 class="menu-item-title">ELVIS</h3>
                    <p class="menu-item-price">55.00 ГРН</p>
                </li>
            </ul>
        </div>
        <aside class="special-offer">
            <img class="special-offer-img" src="images/burger.jpg" alt="Бургер Italian">
            <div class="offer-info">
                <h2 class="special-offer-title">
                    БУРГЕР-ITALIAN !
                </h2>
                <p class="special-offer-price">
                    <span class="special-offer-accent">УСЬОГО</span> 79 ГРН
                </p>
            </div>
        </aside>
        <div class="menu-btn">
            <a href="#" class="btn">ВСЕ МЕНЮ</a>
        </div>
    </section>
</body>
</html>
